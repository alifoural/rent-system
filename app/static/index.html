<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Asset Management & Rental System — Manage rooms, stores, vehicles and track rental finances.">
  <title>Asset Management & Rental System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="/static/style.css?v=2.1">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>
<body>
  <div class="app-layout" id="appLayout">
    <!-- Mobile Header -->
    <header class="mobile-header">
      <div class="logo">R</div>
      <h1 class="mobile-brand">RentFlow</h1>
      <button class="btn btn-icon btn-secondary" onclick="toggleSidebar()">☰</button>
    </header>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="logo">R</div>
        <div>
          <h1 data-i18n="app_name">RentFlow</h1>
          <span data-i18n="app_desc">Asset Management</span>
        </div>
      </div>
      <nav class="sidebar-nav" style="display:flex; flex-direction:column; height: calc(100% - 85px);">
        <div class="nav-section">
          <div class="nav-section-label" data-i18n="nav_overview">Overview</div>
          <a class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
            <span class="icon">📊</span>
            <span class="label" data-i18n="nav_dashboard">Dashboard</span>
          </a>
          <a class="nav-item" data-page="reports" onclick="navigate('reports')">
            <span class="icon">📈</span>
            <span class="label" data-i18n="nav_reports">Reports</span>
          </a>
        </div>
        <div class="nav-section">
          <div class="nav-section-label" data-i18n="nav_management">Management</div>
          <a class="nav-item" data-page="asset-types" onclick="navigate('asset-types')">
            <span class="icon">📁</span>
            <span class="label" data-i18n="nav_asset_types">Asset Types</span>
          </a>
          <a class="nav-item" data-page="assets" onclick="navigate('assets')">
            <span class="icon">🏢</span>
            <span class="label" data-i18n="nav_assets">Assets</span>
          </a>
          <a class="nav-item" data-page="leases" onclick="navigate('leases')">
            <span class="icon">📝</span>
            <span class="label" data-i18n="nav_leases">Leases</span>
          </a>
          <a class="nav-item" data-page="payments" onclick="navigate('payments')">
            <span class="icon">💳</span>
            <span class="label" data-i18n="nav_payments">Payments</span>
          </a>
          <a class="nav-item" data-page="expenses" onclick="navigate('expenses')">
            <span class="icon">🧾</span>
            <span class="label" data-i18n="nav_expenses">Expenses</span>
          </a>
        </div>

        <div class="nav-section" style="margin-top:auto; padding-top:20px; border-top:1px solid var(--border);">
          <div class="nav-section-label">Preferences</div>
          
          <div class="notification-container" onclick="toggleNotifications()" style="padding: 0 12px; margin-bottom: 8px;">
            <div class="nav-item" style="padding: 10px 12px; cursor: pointer;">
              <span class="icon">🔔</span>
              <span class="label">Notifications</span>
              <span id="notificationBadge" class="notification-badge" style="display:none; position:relative; top:0; right:0; margin-left:auto;">0</span>
            </div>
            <div id="notificationDropdown" class="notification-dropdown" style="bottom: 100%; top: auto; left: 10px; right: auto; margin-bottom: 10px;">
              <div class="notification-header">Notifications</div>
              <div id="notificationList" class="notification-list"></div>
            </div>
          </div>

          <a id="themeToggle" class="nav-item" onclick="toggleTheme()" style="cursor: pointer;">
            <span class="icon" id="themeIcon">🌙</span>
            <span class="label" data-i18n="theme_toggle">Night Mode</span>
          </a>

          <a class="nav-item" onclick="toggleLanguage()" style="cursor: pointer;">
            <span class="icon">🌐</span>
            <span class="label">English / عربي</span>
          </a>
        </div>
      </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <header class="topbar">
        <h2 id="pageTitle" class="topbar-title">Dashboard</h2>
        <div id="topbarActions" class="topbar-actions"></div>
      </header>
      <div class="page-content" id="pageContent">
        <!-- Dynamic content rendered here -->
      </div>
    </main>

    <!-- Mobile Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="/static/app.js?v=2.1"></script>
</body>
</html>
